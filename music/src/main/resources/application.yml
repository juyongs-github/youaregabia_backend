server:
  port: 8080

app:
  frontend:
    base-url: "http://localhost:5173"
    oauth2-success-path: "/oauth/callback" # 프론트에서 처리할 경로

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${5480790290-mk53cim374h0habc36v6duvm5oqgu7lp.apps.googleusercontent.com}
            client-secret: ${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}
            scope:
              - email
              - profile

          kakao:
            client-id: ${3079a2215d28509da430521b353a3dcf}
            client-secret: ${AByyiklE4OeV3vKCyOADTKxmnfwbe6yT}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao

          naver:
            client-id: ${qknIc_M1sm_o3lWLGrRb}
            client-secret: ${I0nXLwL1ra}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
